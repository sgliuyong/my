<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>阿里云风格互动投票系统 | 实时统计</title>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Socket.IO 客户端 -->
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <!-- QRCode 生成库 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f7fb;
            color: #1e293b;
        }

        /* 阿里云风格卡片与容器 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            overflow: hidden;
            border: 1px solid #eef2f9;
        }

        .card-header {
            padding: 24px 28px 16px 28px;
            border-bottom: 1px solid #eef2f9;
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #0052cc 0%, #0066ff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .card-body {
            padding: 28px;
        }

        /* 首页二维码区域 */
        .qr-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 20px 30px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 16px 0;
            padding: 16px;
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 12px 24px -12px rgba(0,0,0,0.15);
        }
        .qr-tip {
            text-align: center;
            margin-top: 16px;
            color: #5b6e8c;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .btn-teacher {
            background: linear-gradient(105deg, #0052cc, #0a66e9);
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 48px;
            cursor: pointer;
            width: 80%;
            max-width: 280px;
            margin: 28px auto 12px auto;
            display: block;
            text-align: center;
            transition: all 0.2s;
            box-shadow: 0 6px 14px rgba(0,82,204,0.25);
        }
        .btn-teacher:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #0043a8, #0058dd);
            box-shadow: 0 12px 22px rgba(0,82,204,0.35);
        }

        /* 学生投票选项卡片 (现代风格) */
        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: center;
            margin-bottom: 36px;
        }
        .option-card {
            flex: 1;
            min-width: 220px;
            background: #ffffff;
            border-radius: 28px;
            border: 1.5px solid #e9edf2;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .option-card.selected {
            border-color: #0052cc;
            background: #f6f9ff;
            box-shadow: 0 20px 30px -12px rgba(0,82,204,0.2);
            transform: scale(1.02);
        }
        .option-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #eef2fa;
            transition: transform 0.3s;
        }
        .option-card:hover .option-img {
            transform: scale(1.02);
        }
        .option-label {
            padding: 18px 12px;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: #0f172a;
            border-top: 1px solid #f0f4fa;
            background: #ffffff;
        }
        .vote-btn {
            background: #0052cc;
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 14px 24px;
            border: none;
            border-radius: 56px;
            width: 70%;
            display: block;
            margin: 8px auto 20px auto;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,82,204,0.2);
        }
        .vote-btn:hover {
            background: #0040a3;
            transform: scale(0.98);
        }

        /* 教师仪表板 */
        .chart-container {
            width: 100%;
            height: 400px;
            margin-top: 10px;
        }
        .stats-info {
            background: #f9fbfe;
            border-radius: 28px;
            padding: 20px 24px;
            margin-top: 28px;
            display: flex;
            justify-content: space-around;
            text-align: center;
            border: 1px solid #eef2fa;
        }
        .stat-item h4 {
            font-size: 0.85rem;
            font-weight: 500;
            color: #5b6e8c;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0052cc;
        }
        .footer-note {
            margin-top: 28px;
            text-align: center;
            font-size: 0.8rem;
            color: #8ca3ba;
        }
        .refresh-btn {
            background: #eef2ff;
            border: none;
            color: #0052cc;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }
        .refresh-btn:hover {
            background: #e0e8fe;
        }

        .toast-msg {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293bdd;
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 26px;
            border-radius: 60px;
            font-size: 0.9rem;
            z-index: 1100;
            pointer-events: none;
            font-weight: 500;
            transition: opacity 0.25s;
        }

        @media (max-width: 760px) {
            .options-grid {
                flex-direction: column;
                gap: 18px;
            }
            .card-body {
                padding: 20px;
            }
            .stat-number {
                font-size: 1.7rem;
            }
            .vote-btn {
                width: 90%;
            }
        }
        button {
            background: none;
            border: none;
        }
        .header-icon {
            display: inline-block;
            margin-right: 8px;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- 首页视图：二维码 + 教师入口 -->
    <div id="homeView" class="container" style="display: flex; justify-content: center; align-items: center; min-height: 85vh;">
        <div class="card" style="width: 100%; max-width: 540px;">
            <div class="card-header" style="text-align: center;">🗳️ 互动投票系统</div>
            <div class="card-body qr-wrapper">
                <div id="qrcode"></div>
                <div class="qr-tip">📱 学生扫码参与 · 支持跨设备投票</div>
                <button id="teacherEnterBtn" class="btn-teacher">👩‍🏫 教师进入后台</button>
                <div class="footer-note" style="margin-top: 24px;">数据实时同步 | 阿里云风格仪表板</div>
            </div>
        </div>
    </div>

    <!-- 学生投票视图 -->
    <div id="studentView" style="display: none;">
        <div class="container">
            <div class="card">
                <div class="card-header">✨ 选择你关注的领域</div>
                <div class="card-body">
                    <div class="options-grid" id="optionsGrid">
                        <div class="option-card" data-value="city">
                            <img class="option-img" src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=500&h=300&fit=crop" alt="城市写字楼" onerror="this.src='https://picsum.photos/id/104/400/200'">
                            <div class="option-label">🏙️ 城市写字楼 · 数字经济</div>
                        </div>
                        <div class="option-card" data-value="rural">
                            <img class="option-img" src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=500&h=300&fit=crop" alt="基层农村" onerror="this.src='https://picsum.photos/id/15/400/200'">
                            <div class="option-label">🌾 基层农村 · 乡村振兴</div>
                        </div>
                        <div class="option-card" data-value="other">
                            <img class="option-img" src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500&h=300&fit=crop" alt="其他领域" onerror="this.src='https://picsum.photos/id/91/400/200'">
                            <div class="option-label">🚀 其他领域 · 科技创新</div>
                        </div>
                    </div>
                    <button id="submitVoteBtn" class="vote-btn">🗳️ 立即投票</button>
                    <div class="footer-note">💡 可再次投票覆盖原有选择 · 每一票都算数</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 教师视图：柱状图 + 实时统计 -->
    <div id="teacherView" style="display: none;">
        <div class="container">
            <div class="card">
                <div class="card-header">📊 实时投票占比分析</div>
                <div class="card-body">
                    <div id="barChart" class="chart-container"></div>
                    <div class="stats-info" id="statsInfo">
                        <div class="stat-item"><h4>🏙️ 城市写字楼</h4><span class="stat-number" id="cityCount">0</span></div>
                        <div class="stat-item"><h4>🌾 基层农村</h4><span class="stat-number" id="ruralCount">0</span></div>
                        <div class="stat-item"><h4>🚀 其他领域</h4><span class="stat-number" id="otherCount">0</span></div>
                    </div>
                    <div style="display: flex; justify-content: center; gap: 16px; margin-top: 16px;">
                        <button id="manualRefreshBtn" class="refresh-btn">🔄 手动刷新数据</button>
                    </div>
                    <div class="footer-note">📡 跨设备实时同步 | Socket.io 推送更新</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ----------------------------- 前端核心逻辑 (支持实时通信与降级轮询) -----------------------------
    const BASE_URL = window.location.origin;
    // 连接 Socket.IO
    const socket = io(BASE_URL, { autoConnect: true, reconnection: true });
    let currentView = 'home';
    let selectedOption = null;
    // 设备唯一标识 (localStorage)
    let deviceId = localStorage.getItem('vote_device_id');
    if (!deviceId) {
        deviceId = 'device_' + Math.random().toString(36).substring(2, 12) + Date.now();
        localStorage.setItem('vote_device_id', deviceId);
    }
    let hasVotedCache = false;      // 前端辅助标记
    
    // ---------- 辅助函数 ----------
    function showToast(msg, duration = 2600) {
        let toast = document.querySelector('.toast-msg');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'toast-msg';
            document.body.appendChild(toast);
        }
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, duration);
    }

    function getOptionText(val) {
        if (val === 'city') return '城市写字楼';
        if (val === 'rural') return '基层农村';
        return '其他领域';
    }

    // 切换视图
    function showView(view) {
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('studentView').style.display = 'none';
        document.getElementById('teacherView').style.display = 'none';
        if (view === 'home') {
            document.getElementById('homeView').style.display = 'flex';
            currentView = 'home';
            generateQRCode();
        } else if (view === 'student') {
            document.getElementById('studentView').style.display = 'block';
            currentView = 'student';
            resetStudentUI();
            checkUserPreviousVote();
            bindStudentEvents();
        } else if (view === 'teacher') {
            document.getElementById('teacherView').style.display = 'block';
            currentView = 'teacher';
            initTeacherChart();
            fetchStatsAndRender();
            // 开启轮询保底 (如果socket断连)
            if (window.statsInterval) clearInterval(window.statsInterval);
            window.statsInterval = setInterval(() => {
                if (currentView === 'teacher') fetchStatsAndRender();
            }, 8000);
        } else {
            if (window.statsInterval) clearInterval(window.statsInterval);
        }
    }

    // 首页二维码生成 (学生投票页面链接)
    function generateQRCode() {
        const studentUrl = `${BASE_URL}?role=student`;
        const container = document.getElementById('qrcode');
        if (container) {
            container.innerHTML = '';
            new QRCode(container, {
                text: studentUrl,
                width: 200,
                height: 200,
                colorDark: "#0052cc",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }
    }

    // 重置学生视图样式
    function resetStudentUI() {
        selectedOption = null;
        document.querySelectorAll('.option-card').forEach(card => {
            card.classList.remove('selected');
        });
    }

    // 查询用户之前的投票
    async function checkUserPreviousVote() {
        try {
            const resp = await fetch(`${BASE_URL}/api/user/vote?deviceId=${deviceId}`);
            const data = await resp.json();
            if (data.voted && data.option) {
                hasVotedCache = true;
                selectedOption = data.option;
                // 高亮已有选项
                document.querySelectorAll('.option-card').forEach(card => {
                    if (card.getAttribute('data-value') === data.option) {
                        card.classList.add('selected');
                    }
                });
                showToast(`您上次投票给了“${getOptionText(data.option)}”，可再次投票更改`);
            } else {
                hasVotedCache = false;
            }
        } catch (err) {
            console.warn("查询历史失败", err);
        }
    }

    // 投票提交 (支持覆盖)
    async function submitVote(optionValue, isOverride = false) {
        if (!optionValue) {
            showToast("请先选择一个选项");
            return false;
        }
        try {
            const payload = { deviceId, option: optionValue, override: isOverride };
            const resp = await fetch(`${BASE_URL}/api/vote`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await resp.json();
            if (result.success) {
                showToast(`✅ 投票成功！支持“${getOptionText(optionValue)}”`);
                hasVotedCache = true;
                return true;
            } else if (result.alreadyVoted && !isOverride) {
                const userConfirm = confirm(`您已投给“${getOptionText(result.currentOption)}”，是否要改为“${getOptionText(optionValue)}”？`);
                if (userConfirm) {
                    return await submitVote(optionValue, true);
                } else {
                    showToast("未更改投票");
                    return false;
                }
            } else {
                showToast(result.message || "投票失败，请稍后重试");
                return false;
            }
        } catch (err) {
            console.error(err);
            showToast("网络错误，投票失败");
            return false;
        }
    }

    // 学生卡片事件
    function bindStudentEvents() {
        const cards = document.querySelectorAll('.option-card');
        cards.forEach(card => {
            card.removeEventListener('click', cardClickHandler);
            card.addEventListener('click', cardClickHandler);
        });
        const voteBtn = document.getElementById('submitVoteBtn');
        if (voteBtn) {
            voteBtn.removeEventListener('click', voteClickHandler);
            voteBtn.addEventListener('click', voteClickHandler);
        }
    }
    function cardClickHandler(e) {
        const card = e.currentTarget;
        const value = card.getAttribute('data-value');
        selectedOption = value;
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
    }
    async function voteClickHandler() {
        if (!selectedOption) {
            showToast("请先选择一个领域");
            return;
        }
        await submitVote(selectedOption, false);
    }

    // ---------- 教师端图表 & 统计 ----------
    let barChart = null;
    function initTeacherChart() {
        const dom = document.getElementById('barChart');
        if (barChart) barChart.dispose();
        barChart = echarts.init(dom);
        const option = {
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, backgroundColor: '#fff', borderColor: '#0052cc', borderWidth: 1 },
            grid: { left: '8%', right: '5%', top: '12%', bottom: '5%', containLabel: true },
            xAxis: { type: 'category', data: ['城市写字楼', '基层农村', '其他领域'], axisLabel: { fontWeight: 500, fontSize: 13, color: '#334155' } },
            yAxis: { type: 'value', name: '票数', nameLocation: 'middle', nameGap: 45, axisLabel: { fontWeight: 500 } },
            series: [{
                data: [0, 0, 0],
                type: 'bar',
                barWidth: '48%',
                itemStyle: {
                    borderRadius: [12, 12, 0, 0],
                    color: '#0052cc',
                    shadowColor: 'rgba(0,82,204,0.3)',
                    shadowBlur: 12
                },
                label: { show: true, position: 'top', fontWeight: 'bold', fontSize: 13 }
            }]
        };
        barChart.setOption(option);
    }

    async function fetchStatsAndRender() {
        try {
            const resp = await fetch(`${BASE_URL}/api/stats`);
            const stats = await resp.json();
            const city = stats.city || 0;
            const rural = stats.rural || 0;
            const other = stats.other || 0;
            document.getElementById('cityCount').innerText = city;
            document.getElementById('ruralCount').innerText = rural;
            document.getElementById('otherCount').innerText = other;
            if (barChart) {
                barChart.setOption({ series: [{ data: [city, rural, other] }] });
            } else {
                initTeacherChart();
                barChart.setOption({ series: [{ data: [city, rural, other] }] });
            }
        } catch (err) {
            console.warn("拉取统计失败", err);
        }
    }

    // 监听 socket 实时推送
    socket.on('connect', () => {
        console.log('Socket 已连接，实时同步已启用');
        if (currentView === 'teacher') fetchStatsAndRender();
    });
    socket.on('voteUpdate', (data) => {
        if (currentView === 'teacher') {
            fetchStatsAndRender();
        }
        // 可选: 学生端也可以轻提示更新
        if (currentView === 'student') {
            // 无需频繁刷新，但是可以静默更新后台，保持统计新鲜
        }
    });
    socket.on('disconnect', () => {
        console.warn('Socket断开，使用轮询保障');
    });

    // 手动刷新教师数据
    document.getElementById('manualRefreshBtn')?.addEventListener('click', () => {
        if (currentView === 'teacher') fetchStatsAndRender();
        showToast("数据已刷新");
    });

    // 教师入口按钮
    document.getElementById('teacherEnterBtn')?.addEventListener('click', () => {
        showView('teacher');
        window.history.pushState({}, '', '?role=teacher');
    });

    // 路由解析 (基于URL参数)
    function handleRouting() {
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');
        if (role === 'student') {
            showView('student');
        } else if (role === 'teacher') {
            showView('teacher');
        } else {
            showView('home');
        }
    }

    window.addEventListener('popstate', () => handleRouting());
    handleRouting();

    // 清理轮询定时器防止内存
    window.addEventListener('beforeunload', () => {
        if (window.statsInterval) clearInterval(window.statsInterval);
    });
</script>
</body>
</html>

<!-- 
======================= 配套后端服务 (Node.js + Express + Socket.io) =======================
请将上述 HTML 代码保存为 public/index.html，并创建 server.js 在同一目录下，执行以下步骤：

1. 新建文件夹 vote-system，将本HTML文件放入 vote-system/public/index.html
2. 在 vote-system 目录下创建 server.js 并复制下方代码
3. 终端运行: npm init -y && npm install express socket.io
4. 启动服务: node server.js
5. 访问 http://localhost:3000 即可体验跨设备投票 + 教师实时柱状图

确保手机和电脑在同一局域网，手机扫码时把 localhost 替换为电脑IP地址 (例如 http://192.168.x.x:3000?role=student)
-->

<!-- 以下是 server.js 完整代码 (请单独保存) -->
<!-- 
const express = require('express');
const path = require('path');
const fs = require('fs');
const http = require('http');
const socketIo = require('socket.io');

const app = express();
const server = http.createServer(app);
const io = socketIo(server, { cors: { origin: "*" } });

app.use(express.json());
app.use(express.static(path.join(__dirname, 'public')));

const DATA_FILE = path.join(__dirname, 'voteData.json');

function loadData() {
    if (!fs.existsSync(DATA_FILE)) {
        return { userVotes: {}, stats: { city: 0, rural: 0, other: 0 } };
    }
    try {
        return JSON.parse(fs.readFileSync(DATA_FILE));
    } catch(e) {
        return { userVotes: {}, stats: { city: 0, rural: 0, other: 0 } };
    }
}

function saveData(data) {
    fs.writeFileSync(DATA_FILE, JSON.stringify(data, null, 2));
}

function recomputeStats(data) {
    const stats = { city: 0, rural: 0, other: 0 };
    Object.values(data.userVotes).forEach(opt => {
        if (opt === 'city') stats.city++;
        else if (opt === 'rural') stats.rural++;
        else if (opt === 'other') stats.other++;
    });
    data.stats = stats;
    return stats;
}

function broadcastStats() {
    const data = loadData();
    io.emit('voteUpdate', data.stats);
}

app.post('/api/vote', (req, res) => {
    const { deviceId, option, override } = req.body;
    if (!deviceId || !['city','rural','other'].includes(option)) {
        return res.status(400).json({ success: false, message: '参数错误' });
    }
    let data = loadData();
    const existing = data.userVotes[deviceId];
    if (existing && !override) {
        return res.json({ alreadyVoted: true, currentOption: existing, success: false });
    }
    data.userVotes[deviceId] = option;
    recomputeStats(data);
    saveData(data);
    broadcastStats();
    res.json({ success: true, message: '投票成功' });
});
