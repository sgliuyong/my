<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>互动投票系统 | 腾讯云开发实时同步</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f5f7fb; color: #1e293b; }
        .container { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }
        .card { background: #fff; border-radius: 28px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #eef2f9; }
        .card-header { padding: 24px 28px 16px; border-bottom: 1px solid #eef2f9; font-weight: 600; font-size: 1.6rem; background: linear-gradient(135deg, #0052cc, #0066ff); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .card-body { padding: 28px; }
        .qr-wrapper { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #qrcode { display: flex; justify-content: center; margin: 16px 0; padding: 16px; background: #fff; border-radius: 28px; box-shadow: 0 12px 24px -12px rgba(0,0,0,0.15); }
        .btn-teacher { background: linear-gradient(105deg, #0052cc, #0a66e9); color: white; font-weight: 600; padding: 14px 28px; border-radius: 48px; cursor: pointer; width: 80%; max-width: 280px; margin: 28px auto; display: block; text-align: center; border: none; }
        .network-panel { background: #f8fafc; border-radius: 24px; padding: 16px; margin-top: 20px; border: 1px solid #e2e8f0; }
        .ip-input-group { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
        .ip-input-group input { flex: 2; padding: 10px 14px; border-radius: 40px; border: 1px solid #cbd5e1; }
        .ip-input-group button, .copy-link-btn { background: #eef2ff; color: #0052cc; border: none; padding: 10px 18px; border-radius: 40px; cursor: pointer; }
        .options-grid { display: flex; flex-wrap: wrap; gap: 28px; justify-content: center; margin-bottom: 36px; }
        .option-card { flex: 1; min-width: 220px; background: #fff; border-radius: 28px; border: 1.5px solid #e9edf2; cursor: pointer; transition: 0.2s; }
        .option-card.selected { border-color: #0052cc; background: #f6f9ff; transform: scale(1.02); }
        .option-img { width: 100%; height: 180px; object-fit: cover; }
        .option-label { padding: 18px 12px; text-align: center; font-weight: 700; font-size: 1.2rem; }
        .vote-btn { background: #0052cc; color: white; font-size: 1.25rem; font-weight: 600; padding: 14px 24px; border: none; border-radius: 56px; width: 70%; display: block; margin: 8px auto; cursor: pointer; }
        .chart-container { width: 100%; height: 400px; margin-top: 10px; }
        .stats-info { background: #f9fbfe; border-radius: 28px; padding: 20px 24px; margin-top: 28px; display: flex; justify-content: space-around; text-align: center; flex-wrap: wrap; gap: 20px; }
        .stat-number { font-size: 2.2rem; font-weight: 800; color: #0052cc; }
        .footer-note { margin-top: 28px; text-align: center; font-size: 0.8rem; color: #8ca3ba; }
        .refresh-btn { background: #eef2ff; border: none; color: #0052cc; padding: 8px 18px; border-radius: 40px; cursor: pointer; }
        .toast-msg { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1e293bdd; backdrop-filter: blur(12px); color: white; padding: 12px 26px; border-radius: 60px; z-index: 1100; pointer-events: none; }
        .extra-stats { display: flex; gap: 16px; margin-bottom: 20px; }
        .extra-stat-card { flex: 1; text-align: center; background: #f8fafc; border-radius: 20px; padding: 12px; }
        .extra-number { font-size: 1.8rem; font-weight: 800; }
        .permission-tip { background: #e6f7ff; border-left: 5px solid #1890ff; padding: 10px 15px; border-radius: 16px; margin-bottom: 16px; font-size: 0.8rem; }
        @media (max-width: 760px) { .options-grid { flex-direction: column; } .vote-btn { width: 90%; } }
    </style>
</head>
<body>
<div id="app">
    <!-- 首页 -->
    <div id="homeView" class="container" style="display: flex; justify-content: center; align-items: center; min-height: 85vh;">
        <div class="card" style="width: 100%; max-width: 620px;">
            <div class="card-header" style="text-align: center;">🗳️ 互动投票系统 · 云端实时同步</div>
            <div class="card-body qr-wrapper">
                <div id="qrcode"></div>
                <div class="qr-tip" id="qrTipText">📱 学生扫码参与</div>
                <div class="network-panel">
                    <label>🌐 当前访问地址：</label>
                    <div id="currentAccessUrl" style="font-family: monospace; background:#fff; padding:6px 10px; border-radius: 40px; margin-top: 6px; word-break:break-all;"></div>
                    <div style="margin-top: 12px;">
                        <label>📡 手机扫码请确保能访问此地址：</label>
                        <div class="ip-input-group">
                            <input type="text" id="customIpInput" placeholder="例如 192.168.1.100">
                            <button id="updateQrBtn">更新二维码</button>
                        </div>
                        <button id="copyStudentLinkBtn" class="copy-link-btn">📋 复制投票链接</button>
                        <button id="autoDetectIpBtn" class="copy-link-btn">🔄 自动检测局域网IP</button>
                        <div id="detectedIpInfo" class="detected-ip"></div>
                    </div>
                </div>
                <button id="teacherEnterBtn" class="btn-teacher">👩‍🏫 教师进入后台</button>
                <div class="footer-note">🔥 腾讯云开发实时同步 | 支持覆盖投票</div>
            </div>
        </div>
    </div>

    <!-- 学生端 -->
    <div id="studentView" style="display: none;">
        <div class="container">
            <div class="card">
                <div class="card-header">✨ 选择你关注的领域</div>
                <div class="card-body">
                    <div class="options-grid" id="optionsGrid">
                        <div class="option-card" data-value="city">
                            <img class="option-img" src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=500&h=300&fit=crop">
                            <div class="option-label">🏙️ 城市写字楼</div>
                        </div>
                        <div class="option-card" data-value="rural">
                            <img class="option-img" src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=500&h=300&fit=crop">
                            <div class="option-label">🌾 基层农村</div>
                        </div>
                        <div class="option-card" data-value="other">
                            <img class="option-img" src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500&h=300&fit=crop">
                            <div class="option-label">🚀 其他领域</div>
                        </div>
                    </div>
                    <button id="submitVoteBtn" class="vote-btn">🗳️ 立即投票</button>
                    <div class="footer-note">💡 可再次投票覆盖原选择</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 教师端 -->
    <div id="teacherView" style="display: none;">
        <div class="container">
            <div class="card">
                <div class="card-header">📊 实时投票分析</div>
                <div class="card-body">
                    <div class="permission-tip" id="permissionTip" style="display: none;">⚠️ 数据库权限或文档问题，请检查 pollData 集合权限为“所有用户可读”且存在 main 文档。</div>
                    <div class="extra-stats">
                        <div class="extra-stat-card"><span>📱 总投票次数</span><div class="extra-number" id="totalVotesCount">0</div></div>
                        <div class="extra-stat-card"><span>👥 独立设备数</span><div class="extra-number" id="uniqueDevicesCount">0</div></div>
                    </div>
                    <div id="barChart" class="chart-container"></div>
                    <div class="stats-info">
                        <div class="stat-item"><h4>🏙️ 城市写字楼</h4><span class="stat-number" id="cityCount">0</span></div>
                        <div class="stat-item"><h4>🌾 基层农村</h4><span class="stat-number" id="ruralCount">0</span></div>
                        <div class="stat-item"><h4>🚀 其他领域</h4><span class="stat-number" id="otherCount">0</span></div>
                    </div>
                    <div style="display: flex; justify-content: center; gap: 16px;">
                        <button id="manualRefreshBtn" class="refresh-btn">🔄 手动刷新</button>
                    </div>
                    <div class="footer-note">📡 WebSocket 实时同步 + 轮询兜底 (每3秒)</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== 🔧 请将下面的字符串替换为您的腾讯云开发环境ID ====================
    const CLOUDBASE_ENV_ID = "vote-system-d1g3vx03wbaef4313";   // 例如: "myapp-123abc"
    // ============================================================================

    let app, db, pollDoc;
    let currentView = 'home';
    let selectedOption = null;
    let deviceId = localStorage.getItem('vote_device_id') || ('device_' + Math.random().toString(36).substring(2) + Date.now());
    localStorage.setItem('vote_device_id', deviceId);
    let barChart = null;
    let unwatch = null;
    let isLoggedIn = false;
    let loginPromise = null;
    let pollingInterval = null;

    function showToast(msg, duration = 2600) {
        let toast = document.querySelector('.toast-msg');
        if (!toast) { toast = document.createElement('div'); toast.className = 'toast-msg'; document.body.appendChild(toast); }
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', duration);
    }

    function getOptionText(val) {
        if (val === 'city') return '城市写字楼';
        if (val === 'rural') return '基层农村';
        return '其他领域';
    }

    // 初始化云开发（温和检查环境ID）
    async function initCloudBase() {
        // 检查是否修改了环境ID（不能是默认的 "YOUR_ENV_ID_HERE" 或空）
        if (!CLOUDBASE_ENV_ID || CLOUDBASE_ENV_ID === "YOUR_ENV_ID_HERE") {
            const msg = "❌ 请先修改代码开头的 CLOUDBASE_ENV_ID 为您的腾讯云开发环境ID！";
            console.error(msg);
            document.getElementById('permissionTip') && (document.getElementById('permissionTip').innerHTML = msg, document.getElementById('permissionTip').style.display = 'block');
            showToast(msg, 8000);
            throw new Error(msg);
        }
        app = cloudbase.init({ env: CLOUDBASE_ENV_ID });
        const auth = app.auth();
        loginPromise = auth.signInAnonymously().then(async () => {
            console.log("✅ 匿名登录成功");
            isLoggedIn = true;
            db = app.database();
            pollDoc = db.collection('pollData').doc('main');
            // 测试读取
            try {
                const test = await pollDoc.get();
                console.log("📄 main文档读取成功", test.data);
                document.getElementById('permissionTip') && (document.getElementById('permissionTip').style.display = 'none');
            } catch (err) {
                console.error("❌ 读取main文档失败", err);
                document.getElementById('permissionTip') && (document.getElementById('permissionTip').style.display = 'block');
                showToast("无法读取投票数据，请检查数据库权限和 main 文档是否存在", 5000);
            }
            return true;
        }).catch(err => {
            console.error("登录失败", err);
            showToast("云开发初始化失败，请检查环境ID、匿名登录开关及网络", 5000);
            throw err;
        });
        await loginPromise;
    }

    // 调用云函数投票
    async function castVote(deviceId, newOption) {
        if (!app || !isLoggedIn) throw new Error("未登录");
        const res = await app.callFunction({ name: 'voteFunction', data: { deviceId, newOption } });
        if (res.result && res.result.success) return res.result;
        throw new Error(res.result?.message || "投票失败");
    }

    // 获取当前设备投票
    async function fetchMyVote(deviceId) {
        if (!db || !isLoggedIn) return null;
        try {
            const res = await pollDoc.get();
            return res.data?.deviceVotes?.[deviceId] || null;
        } catch(e) { return null; }
    }

    // 获取统计数据
    async function fetchStatsOnce() {
        if (!db || !isLoggedIn) return null;
        try {
            const res = await pollDoc.get();
            const data = res.data;
            if (!data) return { votes: { city:0, rural:0, other:0 }, deviceCount:0, totalVotes:0 };
            const votes = data.votes || { city:0, rural:0, other:0 };
            const deviceCount = data.deviceCount || 0;
            const totalVotes = (votes.city||0)+(votes.rural||0)+(votes.other||0);
            return { votes, deviceCount, totalVotes };
        } catch(e) { console.warn(e); return null; }
    }

    // 更新教师端UI
    function updateTeacherUI(stats) {
        if (!stats) return;
        document.getElementById('cityCount').innerText = stats.votes.city || 0;
        document.getElementById('ruralCount').innerText = stats.votes.rural || 0;
        document.getElementById('otherCount').innerText = stats.votes.other || 0;
        document.getElementById('totalVotesCount').innerText = stats.totalVotes;
        document.getElementById('uniqueDevicesCount').innerText = stats.deviceCount;
        if (barChart) {
            barChart.setOption({ series: [{ data: [stats.votes.city||0, stats.votes.rural||0, stats.votes.other||0] }] });
        }
        console.log("📊 UI已更新", stats);
    }

    // 教师端实时监听 (watch)
    function startTeacherRealtime() {
        if (unwatch) { unwatch(); unwatch = null; }
        if (!pollDoc || !isLoggedIn) { console.warn("无法启动watch"); return; }
        console.log("📡 建立实时监听 (watch) ...");
        const watcher = pollDoc.watch({
            onChange: (snapshot) => {
                console.log("🔄 watch 触发 onChange", snapshot);
                const data = snapshot.doc;
                if (!data) return;
                const votes = data.votes || { city:0, rural:0, other:0 };
                const deviceCount = data.deviceCount || 0;
                const totalVotes = (votes.city||0)+(votes.rural||0)+(votes.other||0);
                updateTeacherUI({ votes, deviceCount, totalVotes });
            },
            onError: (err) => {
                console.error("❌ watch 出错", err);
                showToast("实时连接中断，使用轮询更新", 3000);
            }
        });
        unwatch = () => watcher.close();
    }

    // 轮询兜底（每3秒）
    function startPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(async () => {
            if (currentView === 'teacher') {
                const stats = await fetchStatsOnce();
                if (stats) updateTeacherUI(stats);
            }
        }, 3000);
        console.log("⏱️ 轮询已启动 (3秒间隔)");
    }

    function stopPolling() {
        if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
    }

    // 教师端初始化图表
    function initTeacherChart() {
        const dom = document.getElementById('barChart');
        if (barChart) barChart.dispose();
        barChart = echarts.init(dom);
        barChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: ['城市写字楼', '基层农村', '其他领域'] },
            yAxis: { type: 'value', name: '票数' },
            series: [{ type: 'bar', data: [0,0,0], itemStyle: { borderRadius: [12,12,0,0], color: '#0052cc' }, label: { show: true } }]
        });
    }

    // 学生投票处理
    async function handleStudentVote(newOption) {
        try {
            if (!isLoggedIn) { showToast("系统初始化中"); return false; }
            const oldVote = await fetchMyVote(deviceId);
            if (oldVote && oldVote !== newOption && !confirm(`已投“${getOptionText(oldVote)}”，是否改为“${getOptionText(newOption)}”？`)) {
                showToast("未更改投票");
                return false;
            }
            const result = await castVote(deviceId, newOption);
            if (result.success) {
                showToast(`投票成功：${getOptionText(newOption)}`);
                selectedOption = newOption;
                document.querySelectorAll('.option-card').forEach(card => {
                    card.classList.toggle('selected', card.getAttribute('data-value') === newOption);
                });
                return true;
            } else {
                showToast("投票失败");
                return false;
            }
        } catch(err) {
            console.error(err);
            showToast(err.message);
            return false;
        }
    }

    async function loadStudentPreviousVote() {
        const myVote = await fetchMyVote(deviceId);
        if (myVote) {
            selectedOption = myVote;
            document.querySelectorAll('.option-card').forEach(card => {
                if (card.getAttribute('data-value') === myVote) card.classList.add('selected');
            });
            showToast(`上次投票：${getOptionText(myVote)}`);
        }
    }

    function bindStudentEvents() {
        const cards = document.querySelectorAll('.option-card');
        const cardHandler = (e) => {
            const card = e.currentTarget;
            selectedOption = card.getAttribute('data-value');
            cards.forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
        };
        cards.forEach(c => { c.removeEventListener('click', cardHandler); c.addEventListener('click', cardHandler); });
        const voteBtn = document.getElementById('submitVoteBtn');
        const voteHandler = async () => {
            if (!selectedOption) { showToast("请先选择一个领域"); return; }
            await handleStudentVote(selectedOption);
        };
        voteBtn.removeEventListener('click', voteHandler);
        voteBtn.addEventListener('click', voteHandler);
    }

    // ----- 二维码与地址 -----
    function getStudentVoteUrl(host) { return `${window.location.protocol}//${host}?role=student`; }
    function generateQRCodeWithHost(host) {
        const container = document.getElementById('qrcode');
        if (!container) return;
        container.innerHTML = '';
        const url = getStudentVoteUrl(host);
        new QRCode(container, { text: url, width: 200, height: 200, colorDark: "#0052cc", correctLevel: QRCode.CorrectLevel.H });
        document.getElementById('qrTipText').innerHTML = `📱 扫码投票 (${url})`;
        document.getElementById('copyStudentLinkBtn')?.setAttribute('data-link', url);
        document.getElementById('currentAccessUrl').innerText = url;
    }
    function refreshQrWithIp(ip) {
        let finalHost = ip.trim() || window.location.host;
        if (!finalHost.includes(':') && window.location.port && !['80','443'].includes(window.location.port)) finalHost += ':' + window.location.port;
        generateQRCodeWithHost(finalHost);
    }
    function getLocalIPs(cb) {
        const ips = [];
        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel('');
        pc.createOffer().then(o => pc.setLocalDescription(o)).catch(e=>console.warn);
        pc.onicecandidate = (e) => {
            if (!e || !e.candidate) {
                const ip = ips.find(i=>i.startsWith('192.168.')||i.startsWith('10.')||i.startsWith('172.')) || ips[0];
                cb(ip || null);
                pc.close();
                return;
            }
            const match = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
            if (match && !ips.includes(match[0])) ips.push(match[0]);
        };
        setTimeout(() => { cb(null); pc.close(); }, 2000);
    }
    async function autoDetectAndSetIp() {
        showToast("检测局域网IP...");
        getLocalIPs((ip) => {
            if (ip) {
                document.getElementById('customIpInput').value = ip;
                refreshQrWithIp(ip);
                document.getElementById('detectedIpInfo').innerHTML = `✅ 已设置IP: ${ip}`;
            } else {
                document.getElementById('detectedIpInfo').innerHTML = `❌ 自动检测失败，请手动输入`;
            }
        });
    }
    function copyStudentLink() {
        const link = document.getElementById('copyStudentLinkBtn')?.getAttribute('data-link');
        if (link) navigator.clipboard.writeText(link).then(()=>showToast("链接已复制"));
        else showToast("请先生成二维码");
    }

    // 视图切换
    async function showView(view) {
        if (!isLoggedIn) {
            try { await loginPromise; } catch(e) { showToast("初始化中，请稍后"); return; }
        }
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('studentView').style.display = 'none';
        document.getElementById('teacherView').style.display = 'none';
        if (view === 'home') {
            document.getElementById('homeView').style.display = 'flex';
            currentView = 'home';
            if (unwatch) unwatch();
            stopPolling();
            refreshQrWithIp(document.getElementById('customIpInput').value || window.location.host);
        } else if (view === 'student') {
            document.getElementById('studentView').style.display = 'block';
            currentView = 'student';
            selectedOption = null;
            document.querySelectorAll('.option-card').forEach(c=>c.classList.remove('selected'));
            await loadStudentPreviousVote();
            bindStudentEvents();
            stopPolling();
            if (unwatch) unwatch();
        } else if (view === 'teacher') {
            document.getElementById('teacherView').style.display = 'block';
            currentView = 'teacher';
            if (!barChart) initTeacherChart();
            const stats = await fetchStatsOnce();
            if (stats) updateTeacherUI(stats);
            else showToast("无法获取数据，请检查权限", 3000);
            startTeacherRealtime();
            startPolling();
        }
    }

    function handleRouting() {
        const role = new URLSearchParams(window.location.search).get('role');
        if (role === 'student') showView('student');
        else if (role === 'teacher') showView('teacher');
        else showView('home');
    }

    window.addEventListener('DOMContentLoaded', async () => {
        await initCloudBase();
        showToast("系统已连接", 2000);
        document.getElementById('teacherEnterBtn').onclick = () => { showView('teacher'); window.history.pushState({}, '', '?role=teacher'); };
        document.getElementById('manualRefreshBtn').onclick = async () => {
            if (currentView === 'teacher') {
                const stats = await fetchStatsOnce();
                if (stats) updateTeacherUI(stats);
                showToast("手动刷新完成");
            }
        };
        document.getElementById('updateQrBtn').onclick = () => refreshQrWithIp(document.getElementById('customIpInput').value);
        document.getElementById('copyStudentLinkBtn').onclick = copyStudentLink;
        document.getElementById('autoDetectIpBtn').onclick = autoDetectAndSetIp;
        window.addEventListener('popstate', () => handleRouting());
        handleRouting();
        setTimeout(() => { if (currentView === 'home') autoDetectAndSetIp(); }, 500);
    });
</script>
</body>
</html>
