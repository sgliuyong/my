<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>阿里云风格互动投票系统 | 实时统计</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f7fb;
            color: #1e293b;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            border: 1px solid #eef2f9;
        }
        .card-header {
            padding: 24px 28px 16px 28px;
            border-bottom: 1px solid #eef2f9;
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #0052cc 0%, #0066ff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .card-body {
            padding: 28px;
        }
        .qr-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 20px 30px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 16px 0;
            padding: 16px;
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 12px 24px -12px rgba(0,0,0,0.15);
        }
        .qr-tip {
            text-align: center;
            margin-top: 16px;
            color: #5b6e8c;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .btn-teacher {
            background: linear-gradient(105deg, #0052cc, #0a66e9);
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 48px;
            cursor: pointer;
            width: 80%;
            max-width: 280px;
            margin: 28px auto 12px auto;
            display: block;
            text-align: center;
            transition: all 0.2s;
            box-shadow: 0 6px 14px rgba(0,82,204,0.25);
        }
        .btn-teacher:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #0043a8, #0058dd);
            box-shadow: 0 12px 22px rgba(0,82,204,0.35);
        }
        .network-panel {
            background: #f8fafc;
            border-radius: 24px;
            padding: 16px;
            margin-top: 20px;
            width: 100%;
            text-align: left;
            border: 1px solid #e2e8f0;
        }
        .network-panel label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #334155;
        }
        .ip-input-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .ip-input-group input {
            flex: 2;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
            background: white;
        }
        .ip-input-group button, .copy-link-btn {
            background: #eef2ff;
            color: #0052cc;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .ip-input-group button:hover, .copy-link-btn:hover {
            background: #e0e8fe;
        }
        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: center;
            margin-bottom: 36px;
        }
        .option-card {
            flex: 1;
            min-width: 220px;
            background: #ffffff;
            border-radius: 28px;
            border: 1.5px solid #e9edf2;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow: hidden;
        }
        .option-card.selected {
            border-color: #0052cc;
            background: #f6f9ff;
            box-shadow: 0 20px 30px -12px rgba(0,82,204,0.2);
            transform: scale(1.02);
        }
        .option-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #eef2fa;
        }
        .option-label {
            padding: 18px 12px;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: #0f172a;
            border-top: 1px solid #f0f4fa;
            background: #ffffff;
        }
        .vote-btn {
            background: #0052cc;
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 14px 24px;
            border: none;
            border-radius: 56px;
            width: 70%;
            display: block;
            margin: 8px auto 20px auto;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,82,204,0.2);
        }
        .vote-btn:hover {
            background: #0040a3;
            transform: scale(0.98);
        }
        .chart-container {
            width: 100%;
            height: 400px;
            margin-top: 10px;
        }
        .stats-info {
            background: #f9fbfe;
            border-radius: 28px;
            padding: 20px 24px;
            margin-top: 28px;
            display: flex;
            justify-content: space-around;
            text-align: center;
            border: 1px solid #eef2fa;
            flex-wrap: wrap;
        }
        .stat-item h4 {
            font-size: 0.85rem;
            font-weight: 500;
            color: #5b6e8c;
            margin-bottom: 8px;
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0052cc;
        }
        .footer-note {
            margin-top: 28px;
            text-align: center;
            font-size: 0.8rem;
            color: #8ca3ba;
        }
        .refresh-btn {
            background: #eef2ff;
            border: none;
            color: #0052cc;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }
        .toast-msg {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293bdd;
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 26px;
            border-radius: 60px;
            font-size: 0.9rem;
            z-index: 1100;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        @media (max-width: 760px) {
            .options-grid { flex-direction: column; gap: 18px; }
            .card-body { padding: 20px; }
            .stat-number { font-size: 1.7rem; }
            .vote-btn { width: 90%; }
        }
        .detected-ip {
            margin-top: 8px;
            font-size: 0.75rem;
            color: #10b981;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- 首页视图：二维码 + 教师入口 + 智能网络配置 -->
    <div id="homeView" class="container" style="display: flex; justify-content: center; align-items: center; min-height: 85vh;">
        <div class="card" style="width: 100%; max-width: 620px;">
            <div class="card-header" style="text-align: center;">🗳️ 互动投票系统</div>
            <div class="card-body qr-wrapper">
                <div id="qrcode"></div>
                <div class="qr-tip" id="qrTipText">📱 学生扫码参与 · 实时同步投票</div>
                <div class="network-panel">
                    <label>🌐 当前访问地址：</label>
                    <div style="font-family: monospace; background:#fff; padding:6px 10px; border-radius: 40px; margin-top: 6px; font-size:0.85rem; word-break:break-all;" id="currentAccessUrl"></div>
                    <div style="margin-top: 12px;">
                        <label>📡 手机扫码请确保手机能访问此地址：</label>
                        <div class="ip-input-group">
                            <input type="text" id="customIpInput" placeholder="例如 192.168.1.100 或 yourdomain.com" value="">
                            <button id="updateQrBtn">更新二维码</button>
                        </div>
                        <div style="margin-top: 8px;">
                            <button id="copyStudentLinkBtn" class="copy-link-btn">📋 复制学生投票链接</button>
                            <button id="autoDetectIpBtn" class="copy-link-btn" style="margin-left: 8px;">🔄 自动检测局域网IP</button>
                        </div>
                        <div id="detectedIpInfo" class="detected-ip"></div>
                        <div class="footer-note" style="margin-top: 10px; font-size:0.75rem;">💡 部署后请使用实际域名或IP，二维码将自动适配</div>
                    </div>
                </div>
                <button id="teacherEnterBtn" class="btn-teacher">👩‍🏫 教师进入后台</button>
                <div class="footer-note">数据实时同步 | 阿里云风格仪表板</div>
            </div>
        </div>
    </div>

    <!-- 学生投票视图 -->
    <div id="studentView" style="display: none;">
        <div class="container">
            <div class="card">
                <div class="card-header">✨ 选择你关注的领域</div>
                <div class="card-body">
                    <div id="studentNetworkAlert" style="display: none; background: #fee2e2; color:#b91c1c; padding:12px; border-radius:20px; margin-bottom:20px; text-align:center;">⚠️ 网络连接不稳定，但投票仍然可用</div>
                    <div class="options-grid" id="optionsGrid">
                        <div class="option-card" data-value="city">
                            <img class="option-img" src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=500&h=300&fit=crop" alt="城市写字楼" onerror="this.src='https://picsum.photos/id/104/400/200'">
                            <div class="option-label">🏙️ 城市写字楼 · 数字经济</div>
                        </div>
                        <div class="option-card" data-value="rural">
                            <img class="option-img" src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=500&h=300&fit=crop" alt="基层农村" onerror="this.src='https://picsum.photos/id/15/400/200'">
                            <div class="option-label">🌾 基层农村 · 乡村振兴</div>
                        </div>
                        <div class="option-card" data-value="other">
                            <img class="option-img" src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500&h=300&fit=crop" alt="其他领域" onerror="this.src='https://picsum.photos/id/91/400/200'">
                            <div class="option-label">🚀 其他领域 · 科技创新</div>
                        </div>
                    </div>
                    <button id="submitVoteBtn" class="vote-btn">🗳️ 立即投票</button>
                    <div class="footer-note">💡 可再次投票覆盖原有选择 · 每一票都算数</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 教师视图 -->
    <div id="teacherView" style="display: none;">
        <div class="container">
            <div class="card">
                <div class="card-header">📊 实时投票占比分析</div>
                <div class="card-body">
                    <div id="barChart" class="chart-container"></div>
                    <div class="stats-info" id="statsInfo">
                        <div class="stat-item"><h4>🏙️ 城市写字楼</h4><span class="stat-number" id="cityCount">0</span></div>
                        <div class="stat-item"><h4>🌾 基层农村</h4><span class="stat-number" id="ruralCount">0</span></div>
                        <div class="stat-item"><h4>🚀 其他领域</h4><span class="stat-number" id="otherCount">0</span></div>
                    </div>
                    <div style="display: flex; justify-content: center; gap: 16px; margin-top: 16px;">
                        <button id="manualRefreshBtn" class="refresh-btn">🔄 手动刷新数据</button>
                    </div>
                    <div class="footer-note">📡 跨设备实时同步 | Socket.io 推送更新</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 前端核心 (扫码优化 + 智能IP检测) ----------
    const BASE_URL = window.location.origin;
    let socket = null;
    let currentView = 'home';
    let selectedOption = null;
    let deviceId = localStorage.getItem('vote_device_id');
    if (!deviceId) {
        deviceId = 'device_' + Math.random().toString(36).substring(2, 12) + Date.now();
        localStorage.setItem('vote_device_id', deviceId);
    }
    let statsInterval = null;

    function showToast(msg, duration = 2600) {
        let toast = document.querySelector('.toast-msg');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'toast-msg';
            document.body.appendChild(toast);
        }
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, duration);
    }

    function getOptionText(val) {
        if (val === 'city') return '城市写字楼';
        if (val === 'rural') return '基层农村';
        return '其他领域';
    }

    // 生成学生投票完整URL (支持自定义host)
    function getStudentVoteUrl(customHost) {
        let host = customHost || window.location.host;
        let protocol = window.location.protocol;
        return `${protocol}//${host}?role=student`;
    }

    // 生成二维码 (使用指定host)
    function generateQRCodeWithHost(host) {
        const container = document.getElementById('qrcode');
        if (!container) return;
        container.innerHTML = '';
        const studentUrl = getStudentVoteUrl(host);
        try {
            new QRCode(container, {
                text: studentUrl,
                width: 200,
                height: 200,
                colorDark: "#0052cc",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            document.getElementById('qrTipText') && (document.getElementById('qrTipText').innerHTML = `📱 扫码进入投票 (${studentUrl})`);
            const copyBtn = document.getElementById('copyStudentLinkBtn');
            if(copyBtn) copyBtn.setAttribute('data-link', studentUrl);
            // 更新显示地址
            document.getElementById('currentAccessUrl').innerText = studentUrl;
        } catch(e) {
            console.warn("QR生成失败", e);
            container.innerHTML = '<div style="padding:20px;">二维码生成失败，请手动复制链接</div>';
        }
    }

    function refreshQrWithIp(ipValue) {
        let finalHost = ipValue.trim();
        if (!finalHost) finalHost = window.location.host;
        // 保留端口（如果用户没输入端口但当前页面有端口且不是默认端口，则追加）
        if (finalHost.indexOf(':') === -1 && window.location.port && window.location.port !== '80' && window.location.port !== '443') {
            finalHost = finalHost + ':' + window.location.port;
        }
        generateQRCodeWithHost(finalHost);
    }

    // 通过 WebRTC 获取局域网 IP (更可靠的自动检测)
    function getLocalIPs(callback) {
        const ips = [];
        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel('');
        pc.createOffer()
            .then(offer => pc.setLocalDescription(offer))
            .catch(e => console.warn("WebRTC failed", e));
        pc.onicecandidate = (event) => {
            if (!event || !event.candidate) return;
            const candidate = event.candidate.candidate;
            const ipRegex = /([0-9]{1,3}\.){3}[0-9]{1,3}/;
            const match = candidate.match(ipRegex);
            if (match && !ips.includes(match[0]) && !match[0].startsWith('192.168.') && !match[0].startsWith('10.') && !match[0].startsWith('172.')) {
                // 忽略公网，优先局域网
            } else if (match && !ips.includes(match[0])) {
                ips.push(match[0]);
            }
        };
        pc.onicecandidate = (event) => {
            if (!event || !event.candidate) {
                // 收集完成
                const localIp = ips.find(ip => ip.startsWith('192.168.') || ip.startsWith('10.') || ip.startsWith('172.')) || ips[0];
                callback(localIp || null);
                pc.close();
                return;
            }
            const candidate = event.candidate.candidate;
            const ipRegex = /([0-9]{1,3}\.){3}[0-9]{1,3}/;
            const match = candidate.match(ipRegex);
            if (match && !ips.includes(match[0])) {
                ips.push(match[0]);
            }
        };
        setTimeout(() => {
            const localIp = ips.find(ip => ip.startsWith('192.168.') || ip.startsWith('10.') || ip.startsWith('172.')) || ips[0];
            callback(localIp || null);
            pc.close();
        }, 2000);
    }

    async function autoDetectAndSetIp() {
        showToast("正在检测本机局域网IP...", 1500);
        getLocalIPs((localIp) => {
            if (localIp) {
                document.getElementById('customIpInput').value = localIp;
                refreshQrWithIp(localIp);
                document.getElementById('detectedIpInfo').innerHTML = `✅ 检测到局域网IP: ${localIp}，已自动填入并更新二维码`;
                showToast(`已设置IP: ${localIp}，手机请连接同一WiFi扫码`);
            } else {
                // 降级：尝试从当前页面 hostname 中提取
                const currentHost = window.location.hostname;
                if (currentHost && currentHost !== 'localhost' && currentHost !== '127.0.0.1') {
                    document.getElementById('customIpInput').value = currentHost;
                    refreshQrWithIp(currentHost);
                    document.getElementById('detectedIpInfo').innerHTML = `⚠️ 未能自动检测局域网IP，已使用当前地址: ${currentHost}`;
                    showToast(`使用当前地址: ${currentHost}`);
                } else {
                    document.getElementById('detectedIpInfo').innerHTML = `❌ 无法自动检测IP，请手动输入服务器的局域网IP或域名`;
                    showToast("请手动输入服务器IP地址", 3000);
                }
            }
        });
    }

    function initSocketConnection() {
        if (socket && socket.connected) return;
        socket = io(BASE_URL, { autoConnect: true, reconnection: true, reconnectionAttempts: 5, timeout: 10000 });
        socket.on('connect', () => {
            console.log('Socket已连接');
            if (currentView === 'teacher') fetchStatsAndRender();
            const alertDiv = document.getElementById('studentNetworkAlert');
            if(alertDiv) alertDiv.style.display = 'none';
        });
        socket.on('voteUpdate', () => { if (currentView === 'teacher') fetchStatsAndRender(); });
        socket.on('disconnect', () => {
            console.warn('Socket断开');
            if (currentView === 'student') {
                const alertDiv = document.getElementById('studentNetworkAlert');
                if(alertDiv) alertDiv.style.display = 'block';
                setTimeout(() => { if(alertDiv) alertDiv.style.display = 'none'; }, 5000);
            }
        });
    }

    function showView(view) {
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('studentView').style.display = 'none';
        document.getElementById('teacherView').style.display = 'none';
        if (view === 'home') {
            document.getElementById('homeView').style.display = 'flex';
            currentView = 'home';
            // 默认使用当前host生成二维码，但如果有检测IP的尝试则保留
            if (!document.getElementById('customIpInput').value.trim()) {
                refreshQrWithIp(window.location.host);
            } else {
                refreshQrWithIp(document.getElementById('customIpInput').value);
            }
            if (statsInterval) clearInterval(statsInterval);
        } else if (view === 'student') {
            document.getElementById('studentView').style.display = 'block';
            currentView = 'student';
            resetStudentUI();
            checkUserPreviousVote();
            bindStudentEvents();
            initSocketConnection();
        } else if (view === 'teacher') {
            document.getElementById('teacherView').style.display = 'block';
            currentView = 'teacher';
            initTeacherChart();
            fetchStatsAndRender();
            if (statsInterval) clearInterval(statsInterval);
            statsInterval = setInterval(() => { if (currentView === 'teacher') fetchStatsAndRender(); }, 8000);
            initSocketConnection();
        }
    }

    function resetStudentUI() {
        selectedOption = null;
        document.querySelectorAll('.option-card').forEach(card => card.classList.remove('selected'));
    }

    async function checkUserPreviousVote() {
        try {
            const resp = await fetch(`${BASE_URL}/api/user/vote?deviceId=${deviceId}`);
            if (!resp.ok) throw new Error();
            const data = await resp.json();
            if (data.voted && data.option) {
                selectedOption = data.option;
                document.querySelectorAll('.option-card').forEach(card => {
                    if (card.getAttribute('data-value') === data.option) card.classList.add('selected');
                });
                showToast(`您上次投票给了“${getOptionText(data.option)}”，可再次更改`);
            }
        } catch (err) { console.warn("查询历史失败"); }
    }

    async function submitVote(optionValue, isOverride = false) {
        if (!optionValue) { showToast("请先选择一个选项"); return false; }
        try {
            const payload = { deviceId, option: optionValue, override: isOverride };
            const resp = await fetch(`${BASE_URL}/api/vote`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await resp.json();
            if (result.success) {
                showToast(`✅ 投票成功！支持“${getOptionText(optionValue)}”`);
                return true;
            } else if (result.alreadyVoted && !isOverride) {
                const userConfirm = confirm(`您已投给“${getOptionText(result.currentOption)}”，是否改为“${getOptionText(optionValue)}”？`);
                if (userConfirm) return await submitVote(optionValue, true);
                else { showToast("未更改投票"); return false; }
            } else {
                showToast(result.message || "投票失败");
                return false;
            }
        } catch (err) {
            console.error(err);
            showToast("网络错误，投票失败");
            return false;
        }
    }

    function bindStudentEvents() {
        const cards = document.querySelectorAll('.option-card');
        cards.forEach(card => {
            card.removeEventListener('click', cardClickHandler);
            card.addEventListener('click', cardClickHandler);
        });
        const voteBtn = document.getElementById('submitVoteBtn');
        if (voteBtn) {
            voteBtn.removeEventListener('click', voteClickHandler);
            voteBtn.addEventListener('click', voteClickHandler);
        }
    }
    function cardClickHandler(e) {
        const card = e.currentTarget;
        selectedOption = card.getAttribute('data-value');
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
    }
    async function voteClickHandler() {
        if (!selectedOption) { showToast("请先选择一个领域"); return; }
        await submitVote(selectedOption, false);
    }

    let barChart = null;
    function initTeacherChart() {
        const dom = document.getElementById('barChart');
        if (barChart) barChart.dispose();
        barChart = echarts.init(dom);
        barChart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '8%', right: '5%', top: '12%', bottom: '5%', containLabel: true },
            xAxis: { type: 'category', data: ['城市写字楼', '基层农村', '其他领域'], axisLabel: { fontWeight: 500 } },
            yAxis: { type: 'value', name: '票数' },
            series: [{ data: [0,0,0], type: 'bar', barWidth: '48%', itemStyle: { borderRadius: [12,12,0,0], color: '#0052cc' }, label: { show: true, position: 'top' } }]
        });
    }
    async function fetchStatsAndRender() {
        try {
            const resp = await fetch(`${BASE_URL}/api/stats`);
            if (!resp.ok) throw new Error();
            const stats = await resp.json();
            const city = stats.city || 0, rural = stats.rural || 0, other = stats.other || 0;
            document.getElementById('cityCount').innerText = city;
            document.getElementById('ruralCount').innerText = rural;
            document.getElementById('otherCount').innerText = other;
            if (barChart) barChart.setOption({ series: [{ data: [city, rural, other] }] });
            else { initTeacherChart(); barChart.setOption({ series: [{ data: [city, rural, other] }] }); }
        } catch (err) { console.warn("统计拉取失败"); }
    }

    function copyStudentLink() {
        const link = document.getElementById('copyStudentLinkBtn')?.getAttribute('data-link');
        if (link) navigator.clipboard.writeText(link).then(() => showToast("链接已复制")).catch(() => showToast("复制失败"));
        else showToast("请先生成二维码");
    }

    // 事件绑定
    document.getElementById('teacherEnterBtn')?.addEventListener('click', () => {
        showView('teacher');
        window.history.pushState({}, '', '?role=teacher');
    });
    document.getElementById('manualRefreshBtn')?.addEventListener('click', () => {
        if (currentView === 'teacher') fetchStatsAndRender();
        showToast("数据已刷新");
    });
    document.getElementById('updateQrBtn')?.addEventListener('click', () => {
        let customIp = document.getElementById('customIpInput').value.trim();
        if (!customIp) customIp = window.location.host;
        refreshQrWithIp(customIp);
        showToast(`二维码已更新，地址: ${getStudentVoteUrl(customIp)}`);
        document.getElementById('detectedIpInfo').innerHTML = `✅ 已手动设置为: ${customIp}`;
    });
    document.getElementById('copyStudentLinkBtn')?.addEventListener('click', copyStudentLink);
    document.getElementById('autoDetectIpBtn')?.addEventListener('click', autoDetectAndSetIp);

    function handleRouting() {
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');
        if (role === 'student') showView('student');
        else if (role === 'teacher') showView('teacher');
        else showView('home');
    }
    window.addEventListener('popstate', () => handleRouting());
    handleRouting();
    window.addEventListener('beforeunload', () => { if (statsInterval) clearInterval(statsInterval); });
    initSocketConnection();

    // 页面加载后自动尝试检测IP (但不强制覆盖，仅作为辅助)
    setTimeout(() => {
        if (currentView === 'home' && !document.getElementById('customIpInput').value) {
            autoDetectAndSetIp();
        }
    }, 500);
</script>
</body>
</html>
