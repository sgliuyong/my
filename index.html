<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投票系统 - 稳健版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        body { font-family: system-ui; background: #f0f2f5; padding: 20px; }
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .options-grid { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .option-card { flex: 1; border: 2px solid #ddd; border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; background: #fafafa; }
        .option-card.selected { border-color: #0052cc; background: #e6f2ff; }
        .vote-btn { background: #0052cc; color: white; border: none; padding: 12px 24px; border-radius: 40px; font-size: 1.2rem; cursor: pointer; width: 200px; margin: 0 auto; display: block; }
        .stats-info { display: flex; gap: 40px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
        .stat-number { font-size: 2rem; font-weight: bold; color: #0052cc; }
        .chart-container { height: 400px; margin-top: 20px; }
        button { margin: 5px; padding: 8px 16px; }
        .error-msg { color: red; margin: 10px 0; padding: 10px; background: #ffe6e6; border-radius: 8px; display: none; }
    </style>
</head>
<body>
<div id="homeView">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <h2>🗳️ 互动投票系统</h2>
        <div id="qrcode"></div>
        <button id="teacherEnterBtn">👩‍🏫 教师后台</button>
        <div style="margin-top: 20px;">
            <input type="text" id="customIpInput" placeholder="输入IP或域名">
            <button id="updateQrBtn">更新二维码</button>
            <button id="copyLinkBtn">复制投票链接</button>
        </div>
        <div id="initError" class="error-msg"></div>
    </div>
</div>

<div id="studentView" style="display:none;">
    <div class="card">
        <h2>✨ 选择你关注的领域</h2>
        <div class="options-grid" id="optionsGrid">
            <div class="option-card" data-value="city">🏙️ 城市写字楼</div>
            <div class="option-card" data-value="rural">🌾 基层农村</div>
            <div class="option-card" data-value="other">🚀 其他领域</div>
        </div>
        <button id="submitVoteBtn" class="vote-btn">🗳️ 立即投票</button>
    </div>
</div>

<div id="teacherView" style="display:none;">
    <div class="card">
        <h2>📊 实时投票数据（每2秒轮询）</h2>
        <div class="stats-info">
            <div><h4>城市写字楼</h4><span class="stat-number" id="cityCount">0</span></div>
            <div><h4>基层农村</h4><span class="stat-number" id="ruralCount">0</span></div>
            <div><h4>其他领域</h4><span class="stat-number" id="otherCount">0</span></div>
        </div>
        <div class="stats-info">
            <div><h4>总投票次数</h4><span class="stat-number" id="totalVotesCount">0</span></div>
            <div><h4>独立设备数</h4><span class="stat-number" id="uniqueDevicesCount">0</span></div>
        </div>
        <div id="barChart" class="chart-container"></div>
        <button id="manualRefreshBtn">🔄 手动刷新</button>
        <p style="margin-top: 20px; font-size: 12px; color: gray;">控制台会打印详细日志，请按F12查看</p>
    </div>
</div>

<script>
    // ==================== 请替换为您的环境ID ====================
    const ENV_ID = "vote-system-d1g3vx03wbaef4313";   // 例如 "myapp-123abc"
    // ========================================================

    let app, db;
    let currentView = 'home';
    let selectedOption = null;
    let deviceId = localStorage.getItem('device_id') || ('d_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6));
    localStorage.setItem('device_id', deviceId);
    let barChart = null;
    let pollingTimer = null;
    let isLoggedIn = false;
    let loginPromise = null;

    function showToast(msg) {
        alert(msg);
    }

    // 初始化云开发（确保登录完成才resolve）
    async function init() {
        if (!ENV_ID || ENV_ID === "YOUR_ENV_ID_HERE") {
            const errMsg = "❌ 请先修改 ENV_ID 为您的腾讯云开发环境ID";
            document.getElementById('initError').innerText = errMsg;
            document.getElementById('initError').style.display = 'block';
            throw new Error(errMsg);
        }
        if (app) return; // 已初始化

        app = cloudbase.init({ env: ENV_ID });
        const auth = app.auth();
        loginPromise = auth.signInAnonymously().then(() => {
            console.log("✅ 匿名登录成功");
            isLoggedIn = true;
            db = app.database();
            // 测试连接
            return db.collection('pollData').doc('main').get().then(res => {
                console.log("✅ 数据库连接成功，当前数据:", res.data);
                document.getElementById('initError').style.display = 'none';
            }).catch(err => {
                console.error("❌ 数据库读取失败，请检查权限和 main 文档", err);
                document.getElementById('initError').innerText = "数据库读取失败：请确保 pollData 集合权限为「所有用户可读」且存在 _id 为 main 的文档";
                document.getElementById('initError').style.display = 'block';
                throw err;
            });
        }).catch(err => {
            console.error("❌ 匿名登录失败", err);
            document.getElementById('initError').innerText = "匿名登录失败，请检查云开发环境ID和安全域名设置";
            document.getElementById('initError').style.display = 'block';
            throw err;
        });
        await loginPromise;
    }

    // 调用云函数投票
    async function vote(option) {
        if (!isLoggedIn) throw new Error("未登录");
        const res = await app.callFunction({ name: 'voteFunction', data: { deviceId, newOption: option } });
        if (res.result && res.result.success) return true;
        throw new Error(res.result?.message || "投票失败");
    }

    // 获取当前设备投票
    async function getMyVote() {
        if (!isLoggedIn) return null;
        try {
            const res = await db.collection('pollData').doc('main').get();
            return res.data?.deviceVotes?.[deviceId] || null;
        } catch(e) { console.warn(e); return null; }
    }

    // 获取统计数据（带详细日志）
    async function fetchStats() {
        if (!isLoggedIn) {
            console.warn("fetchStats: 未登录");
            return null;
        }
        try {
            const res = await db.collection('pollData').doc('main').get();
            console.log("🔍 fetchStats 原始返回:", JSON.parse(JSON.stringify(res.data)));
            const data = res.data;
            if (!data) return null;
            const votes = data.votes || { city: 0, rural: 0, other: 0 };
            const deviceCount = data.deviceCount || 0;
            const totalVotes = (votes.city||0)+(votes.rural||0)+(votes.other||0);
            return { votes, deviceCount, totalVotes };
        } catch(e) {
            console.error("❌ fetchStats 错误:", e);
            return null;
        }
    }

    function updateUI(stats) {
        if (!stats) return;
        document.getElementById('cityCount').innerText = stats.votes.city;
        document.getElementById('ruralCount').innerText = stats.votes.rural;
        document.getElementById('otherCount').innerText = stats.votes.other;
        document.getElementById('totalVotesCount').innerText = stats.totalVotes;
        document.getElementById('uniqueDevicesCount').innerText = stats.deviceCount;
        if (barChart) {
            barChart.setOption({
                series: [{ data: [stats.votes.city, stats.votes.rural, stats.votes.other] }]
            });
        }
        console.log("📊 UI更新完成", stats);
    }

    function startPolling() {
        if (pollingTimer) clearInterval(pollingTimer);
        pollingTimer = setInterval(async () => {
            if (currentView === 'teacher' && isLoggedIn) {
                const stats = await fetchStats();
                if (stats) updateUI(stats);
            }
        }, 2000);
    }

    function stopPolling() {
        if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
    }

    async function handleStudentVote(option) {
        try {
            if (!isLoggedIn) { showToast("系统初始化中"); return; }
            const old = await getMyVote();
            if (old === option) { showToast("您已投过该选项"); return; }
            if (old && !confirm(`您已投“${old}”，确定改为“${option}”吗？`)) return;
            const ok = await vote(option);
            if (ok) {
                showToast(`投票成功：${option}`);
                selectedOption = option;
                document.querySelectorAll('.option-card').forEach(card => {
                    card.classList.toggle('selected', card.dataset.value === option);
                });
                if (currentView === 'teacher') {
                    const stats = await fetchStats();
                    if (stats) updateUI(stats);
                }
            } else {
                showToast("投票失败");
            }
        } catch(e) {
            console.error(e);
            showToast(e.message);
        }
    }

    async function loadStudentVote() {
        const my = await getMyVote();
        if (my) {
            selectedOption = my;
            document.querySelectorAll('.option-card').forEach(card => {
                if (card.dataset.value === my) card.classList.add('selected');
            });
            showToast(`您已投：${my}`);
        }
    }

    async function showView(view) {
        if (!isLoggedIn) {
            try {
                await init();
            } catch(e) {
                console.error("初始化失败", e);
                showToast("系统初始化失败，请检查环境ID和网络");
                return;
            }
        }
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('studentView').style.display = 'none';
        document.getElementById('teacherView').style.display = 'none';
        if (view === 'home') {
            document.getElementById('homeView').style.display = 'block';
            currentView = 'home';
            stopPolling();
            generateQRCode();
        } else if (view === 'student') {
            document.getElementById('studentView').style.display = 'block';
            currentView = 'student';
            selectedOption = null;
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            await loadStudentVote();
            stopPolling();
        } else if (view === 'teacher') {
            document.getElementById('teacherView').style.display = 'block';
            currentView = 'teacher';
            if (!barChart) {
                barChart = echarts.init(document.getElementById('barChart'));
                barChart.setOption({
                    xAxis: { type: 'category', data: ['城市写字楼', '基层农村', '其他领域'] },
                    yAxis: { type: 'value' },
                    series: [{ type: 'bar', data: [0,0,0], itemStyle: { borderRadius: [8,8,0,0] } }]
                });
            }
            const stats = await fetchStats();
            if (stats) updateUI(stats);
            startPolling();
        }
    }

    function getStudentUrl(host) {
        let protocol = window.location.protocol;
        let h = host || window.location.host;
        if (!h.includes(':') && window.location.port && !['80','443'].includes(window.location.port)) h += ':' + window.location.port;
        return `${protocol}//${h}?role=student`;
    }
    function generateQRCode(host) {
        const url = getStudentUrl(host);
        const container = document.getElementById('qrcode');
        if (container) {
            container.innerHTML = '';
            new QRCode(container, { text: url, width: 180, height: 180 });
        }
        const copyBtn = document.getElementById('copyLinkBtn');
        if (copyBtn) copyBtn.setAttribute('data-link', url);
    }
    function copyLink() {
        const link = document.getElementById('copyLinkBtn')?.getAttribute('data-link');
        if (link) navigator.clipboard.writeText(link).then(()=>alert("链接已复制"));
    }

    function handleRoute() {
        const role = new URLSearchParams(location.search).get('role');
        if (role === 'student') showView('student');
        else if (role === 'teacher') showView('teacher');
        else showView('home');
    }

    window.addEventListener('DOMContentLoaded', async () => {
        // 先显示首页，不阻塞初始化
        handleRoute();
        document.getElementById('teacherEnterBtn').onclick = () => { showView('teacher'); history.pushState({}, '', '?role=teacher'); };
        document.getElementById('updateQrBtn').onclick = () => generateQRCode(document.getElementById('customIpInput').value);
        document.getElementById('copyLinkBtn').onclick = copyLink;
        document.getElementById('manualRefreshBtn').onclick = async () => { if(currentView==='teacher'){ const s=await fetchStats(); if(s) updateUI(s); } };
        document.getElementById('submitVoteBtn').onclick = async () => {
            if (!selectedOption) { alert("请先选择一个领域"); return; }
            await handleStudentVote(selectedOption);
        };
        document.querySelectorAll('.option-card').forEach(card => {
            card.onclick = () => {
                selectedOption = card.dataset.value;
                document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
            };
        });
        window.addEventListener('popstate', handleRoute);
        // 后台初始化（不阻塞显示）
        init().catch(e => console.error("初始化失败", e));
    });
</script>
</body>
</html>
